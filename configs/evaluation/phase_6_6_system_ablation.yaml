# Phase 6.6 System Ablation Configuration
# Prepared by Phase 6.55 audit

main_model: deepseek-v4-flash
secondary_model: doubao-seed-2.0-pro
benchmark_first_test_model_only: true
doubao_concurrency_limited: true
xiaomi_use_if_available: true

systems:
  - direct_llm
  - single_react
  - plan_execute
  - broadcast
  - static_router
  - dtcg

max_tasks_initial: 100
max_workers: 16
judge_workers: 8
adaptive_concurrency: true

benchmark_subsets:
  - cfbench_agenttask
  - cfbench_core

metrics:
  - task_success_rate
  - answer_correctness
  - context_token_cost
  - total_llm_calls
  - latency
  - duplicate_context_ratio
  - retrieved_relevant_context_ratio
  - evidence_support
  - hallucination_rate
  - cost_per_correct_answer
