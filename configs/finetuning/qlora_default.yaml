# QLoRA Default Configuration for Phase 7
# Usage: python scripts/run_phase_7_train_qlora.py --config configs/finetuning/qlora_default.yaml

# Base model
base_model: ""  # Set via CLI

# QLoRA configuration (4-bit quantization)
qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

# LoRA configuration
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

# Training hyperparameters
training:
  learning_rate: 2.0e-4
  batch_size: 2
  gradient_accumulation_steps: 8
  max_seq_length: 2048
  num_epochs: 3
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  save_steps: 100
  eval_steps: 50
  logging_steps: 10
  mixed_precision: "bf16"
  gradient_checkpointing: true
  seed: 42

# Output
output_dir: "data/finetuning_outputs/qlora_default"
run_name: "cf_qlora_default"

# Safety
run_training: false
