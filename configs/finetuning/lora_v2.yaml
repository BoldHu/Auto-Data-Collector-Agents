# LoRA v2 Configuration for Phase 8
# Based on Phase 7.5 expanded dataset (2331 samples)

base_model: ""  # Set via CLI

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  learning_rate: 2.0e-4
  batch_size: 2
  gradient_accumulation_steps: 8
  max_seq_length: 2048
  num_train_epochs: 3
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  save_steps: 50
  eval_steps: 50
  logging_steps: 10
  mixed_precision: "bf16"
  gradient_checkpointing: true
  seed: 42

output_dir: "data/finetuning_outputs/lora_v2"
run_name: "cf_lora_v2"

# Safety
run_training: false
